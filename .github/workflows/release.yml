name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to attach artifacts to a release on tag

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python + deps
        run: |
          uv python install 3.12
          uv venv
          uv pip install -e ".[dev]"

      # --- launcher icons ----------------------------------------------------
      - name: Generate launcher icons (Windows/Linux)
        run: uv run python packaging/make_icons.py

      - name: Build macOS .icns
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          MASTER=src/sentinelgui/resources/icon.png
          ICONSET=packaging/build-icons/app.iconset
          mkdir -p "$ICONSET" packaging/build-icons
          for s in 16 32 128 256 512; do
            sips -z $s $s        "$MASTER" --out "$ICONSET/icon_${s}x${s}.png"
            sips -z $((s*2)) $((s*2)) "$MASTER" --out "$ICONSET/icon_${s}x${s}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o packaging/build-icons/app.icns
          echo "built packaging/build-icons/app.icns"

      # --- freeze ------------------------------------------------------------
      - name: PyInstaller build
        run: uv run pyinstaller packaging/sentinelgui.spec --noconfirm

      # --- smoke test (hard gate) -------------------------------------------
      - name: Smoke test (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a ./dist/SentinelGUI/SentinelGUI self-check

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: ./dist/SentinelGUI/SentinelGUI self-check

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: .\dist\SentinelGUI\SentinelGUI.exe self-check

      # --- per-OS installers (soft; build+smoke are the hard gates) ----------
      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          bash packaging/installers/linux/build-appimage.sh

      - name: Build DMG (macOS)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          brew install create-dmg
          bash packaging/installers/macos/build-dmg.sh

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: packaging/installers/windows/sentinelgui.iss

      # --- artifacts ---------------------------------------------------------
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: SentinelGUI-installer-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.dmg
            dist/SentinelGUI-Setup.exe
          if-no-files-found: ignore

      - name: Upload frozen bundle
        uses: actions/upload-artifact@v4
        with:
          name: SentinelGUI-dist-${{ matrix.os }}
          path: dist/SentinelGUI*

      # --- attach to release on tag -----------------------------------------
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/*.dmg
            dist/SentinelGUI-Setup.exe
          fail_on_unmatched_files: false
