name: ci

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python + deps
        run: |
          uv python install 3.12
          uv venv
          uv pip install -e ".[dev]"

      # PySide6's QtGui dlopens libEGL/libGL at import; the runner image ships
      # neither, so even headless (offscreen) imports fail without these.
      - name: Install system libraries for headless Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest (headless)
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest -q
